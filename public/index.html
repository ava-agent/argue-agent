<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Argue Agent — 实时辩论事实核查</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #050507;
  --surface: #0a0a11;
  --card: #0e0e18;
  --elevated: #151524;
  --border: #1a1a30;
  --border-active: #2a2a4a;

  --text: #d6d4ce;
  --text-2: #7a788e;
  --text-3: #3e3c52;

  --violet: #8b6cef;
  --violet-soft: rgba(139,108,239,0.10);
  --violet-glow: rgba(139,108,239,0.25);

  --emerald: #3dd68c;
  --emerald-bg: rgba(61,214,140,0.08);
  --amber: #eab308;
  --amber-bg: rgba(234,179,8,0.08);
  --rose: #ef4444;
  --rose-bg: rgba(239,68,68,0.08);
  --slate: #64748b;
  --slate-bg: rgba(100,116,139,0.08);
}

html { font-size: 16px; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── Noise Overlay ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.018;
  background: repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%) 0 0 / 2px 2px;
  z-index: 9999;
}

/* ── Ambient Glow ── */
.ambient {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.07;
  pointer-events: none;
  z-index: 0;
}
.ambient-1 { top: -200px; left: -100px; background: var(--violet); }
.ambient-2 { bottom: -300px; right: -200px; background: var(--emerald); }

/* ── Layout ── */
.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
header {
  padding: 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Bodoni Moda', serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-2);
}
.logo span { color: var(--violet); }
.gh-link {
  color: var(--text-3);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.2s;
  font-family: 'Space Mono', monospace;
}
.gh-link:hover { color: var(--violet); }

/* ── Hero ── */
.hero {
  padding: 64px 0 48px;
  text-align: center;
}
.hero h1 {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(2.4rem, 6vw, 3.8rem);
  font-weight: 900;
  font-style: italic;
  line-height: 1.1;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--text), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}
.hero p {
  color: var(--text-2);
  font-size: 15px;
  font-weight: 300;
  max-width: 480px;
  margin: 0 auto;
}

/* ── Input Section ── */
.input-section { padding-bottom: 40px; }
.input-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 20px;
  transition: border-color 0.3s;
}
.input-box:focus-within {
  border-color: var(--violet);
  box-shadow: 0 0 0 1px var(--violet-glow);
}
.input-box.listening {
  border-color: var(--rose);
  box-shadow: 0 0 0 1px rgba(239,68,68,0.25);
}
.input-box textarea {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  min-height: 80px;
}
.input-box textarea::placeholder { color: var(--text-3); }
.input-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  gap: 12px;
}
.examples { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.example-chip {
  font-size: 11px;
  padding: 4px 10px;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Space Mono', monospace;
  white-space: nowrap;
}
.example-chip:hover { border-color: var(--violet); color: var(--text); }

.btn-group { display: flex; gap: 8px; align-items: center; }

.btn-mic {
  width: 42px; height: 42px;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
}
.btn-mic:hover { border-color: var(--violet); color: var(--text); }
.btn-mic.listening {
  background: var(--rose-bg);
  border-color: var(--rose);
  color: var(--rose);
  animation: micPulse 1.5s ease-in-out infinite;
}
.btn-mic.unsupported { display: none; }
.btn-mic svg { width: 18px; height: 18px; }
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}

/* Listening banner */
.listening-banner {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  margin-top: 12px;
  background: var(--rose-bg);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 2px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--rose);
  letter-spacing: 0.05em;
}
.listening-banner.active { display: flex; }
.listening-dot {
  width: 6px; height: 6px;
  background: var(--rose);
  border-radius: 50%;
  animation: dotBlink 1s ease-in-out infinite;
}
@keyframes dotBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.btn-verify {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 28px;
  background: var(--violet);
  color: #fff;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-verify:hover { filter: brightness(1.15); }
.btn-verify:active { transform: scale(0.97); }
.btn-verify:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-verify .spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.btn-verify.loading .label { display: none; }
.btn-verify.loading .spinner { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Results Section ── */
.results-section { padding-bottom: 40px; }
.section-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-3);
  padding-bottom: 12px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.results-empty {
  text-align: center;
  padding: 40px 0;
  color: var(--text-3);
  font-size: 13px;
}
.main-argument {
  font-family: 'Bodoni Moda', serif;
  font-size: 18px;
  font-style: italic;
  color: var(--text-2);
  margin-bottom: 20px;
  padding-left: 16px;
  border-left: 2px solid var(--violet);
}

/* ── Pipeline Progress ── */
.pipeline-progress {
  display: none;
  gap: 0;
  margin-bottom: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.pipeline-progress.active { display: flex; }
.pipeline-step {
  flex: 1;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-3);
  text-align: center;
  position: relative;
  transition: all 0.3s;
}
.pipeline-step:first-child { border-radius: 2px 0 0 2px; }
.pipeline-step:last-child { border-radius: 0 2px 2px 0; }
.pipeline-step + .pipeline-step { border-left: none; }
.pipeline-step.active {
  color: var(--violet);
  background: var(--violet-soft);
  border-color: var(--violet);
}
.pipeline-step.active + .pipeline-step { border-left-color: var(--violet); }
.pipeline-step.done {
  color: var(--emerald);
  background: var(--emerald-bg);
  border-color: rgba(61,214,140,0.2);
}
.pipeline-step.done + .pipeline-step { border-left-color: rgba(61,214,140,0.2); }

/* ── Verdict Card ── */
.verdict-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 24px;
  margin-bottom: 16px;
  border-left: 3px solid var(--slate);
  animation: cardIn 0.4s ease-out both;
  transition: border-color 0.3s;
}
.verdict-card:hover { border-color: var(--border-active); }
.verdict-card.verified, .verdict-card.mostly_true { border-left-color: var(--emerald); }
.verdict-card.questionable { border-left-color: var(--amber); }
.verdict-card.mostly_false, .verdict-card.false { border-left-color: var(--rose); }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Skeleton loading state */
.verdict-card.skeleton { border-left-color: var(--violet); }
.verdict-card.skeleton .skeleton-bar {
  height: 12px;
  background: linear-gradient(90deg, var(--elevated) 25%, var(--border) 50%, var(--elevated) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: 2px;
  margin-bottom: 8px;
}
.verdict-card.skeleton .skeleton-bar:last-child { margin-bottom: 0; }
.verdict-card.skeleton .skeleton-bar.short { width: 60%; }
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.verdict-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.verdict-badge {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 2px;
}
.verdict-badge.verified, .verdict-badge.mostly_true {
  background: var(--emerald-bg); color: var(--emerald); border: 1px solid rgba(61,214,140,0.2);
}
.verdict-badge.questionable {
  background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(234,179,8,0.2);
}
.verdict-badge.mostly_false, .verdict-badge.false {
  background: var(--rose-bg); color: var(--rose); border: 1px solid rgba(239,68,68,0.2);
}
.verdict-badge.unverifiable {
  background: var(--slate-bg); color: var(--slate); border: 1px solid rgba(100,116,139,0.2);
}
.verdict-badge.pending {
  background: var(--violet-soft); color: var(--violet); border: 1px solid rgba(139,108,239,0.2);
}
.verdict-conf { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-3); }
.verdict-claim { font-size: 15px; font-weight: 500; margin-bottom: 10px; line-height: 1.5; }
.verdict-summary { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 12px; }
.verdict-rebuttal {
  font-size: 13px; padding: 14px 16px;
  background: var(--elevated); border: 1px solid var(--border);
  border-radius: 2px; margin-bottom: 12px; line-height: 1.6;
}
.verdict-rebuttal-label {
  font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--violet); display: block; margin-bottom: 6px;
}
.evidence-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.evidence-item { font-size: 12px; color: var(--text-2); display: flex; align-items: baseline; gap: 6px; }
.evidence-item a { color: var(--text-2); text-decoration: none; transition: color 0.2s; }
.evidence-item a:hover { color: var(--violet); }

.no-claims {
  padding: 20px 24px; background: var(--card);
  border: 1px solid var(--border); border-radius: 2px;
  color: var(--text-2); font-size: 14px; text-align: center;
  animation: cardIn 0.4s ease-out both;
}

/* ── Loading ── */
.scan-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--violet), transparent);
  animation: scan 1.2s ease-in-out infinite;
  margin-bottom: 20px; border-radius: 1px; display: none;
}
.scan-line.active { display: block; }
@keyframes scan {
  0% { opacity: 0.3; transform: scaleX(0.3); }
  50% { opacity: 1; transform: scaleX(1); }
  100% { opacity: 0.3; transform: scaleX(0.3); }
}

/* ── Recent Section ── */
.recent-section { padding-bottom: 60px; }
.recent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.recent-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 2px; padding: 16px; cursor: pointer; transition: all 0.2s;
}
.recent-card:hover { border-color: var(--border-active); background: var(--elevated); }
.recent-text {
  font-size: 13px; color: var(--text); margin-bottom: 10px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.recent-meta {
  font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-3);
  display: flex; align-items: center; gap: 8px;
}
.recent-badges { display: flex; gap: 4px; }
.recent-badge { width: 6px; height: 6px; border-radius: 1px; }

/* ── Footer ── */
footer { border-top: 1px solid var(--border); padding: 24px 0; text-align: center; }
footer p { font-size: 12px; color: var(--text-3); font-family: 'Space Mono', monospace; }
footer a { color: var(--text-2); text-decoration: none; }
footer a:hover { color: var(--violet); }

/* ── Animations ── */
.fade-in { opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease-out forwards; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .hero { padding: 40px 0 32px; }
  .hero h1 { font-size: 2rem; }
  .input-actions { flex-direction: column; align-items: stretch; }
  .examples { justify-content: center; }
  .btn-group { justify-content: center; }
  .btn-verify { flex: 1; text-align: center; }
  .recent-grid { grid-template-columns: 1fr; }
  .pipeline-step { font-size: 10px; padding: 8px 6px; }
}
</style>
</head>

// ── Helpers ──

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') node.className = v;
      else if (k === 'textContent') node.textContent = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    }
  }
  if (children) {
    for (const child of Array.isArray(children) ? children : [children]) {
      if (typeof child === 'string') node.appendChild(document.createTextNode(child));
      else if (child) node.appendChild(child);
    }
  }
  return node;
}

function timeAgo(ts) {
  const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
  if (m < 1) return '刚刚';
  if (m < 60) return m + ' 分钟前';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' 小时前';
  return Math.floor(h / 24) + ' 天前';
}

function setPipelineStep(step) {
  const steps = ['stepExtract', 'stepSearch', 'stepVerdict'];
  const idx = steps.indexOf(step);
  steps.forEach((s, i) => {
    const el = $(s);
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    else if (i === idx) el.classList.add('active');
  });
}

// ── Example chips ──
document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => { inputEl.value = chip.dataset.text; inputEl.focus(); });
});

// ── Keyboard ──
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doAnalyze(); }
});
btnVerify.addEventListener('click', doAnalyze);

// ── Web Speech API ──

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;
let pendingTranscript = '';
let interimTranscript = '';

if (!SpeechRecognition) {
  btnMic.classList.add('unsupported');
} else {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    interimTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        // Accumulate into conversation buffer
        conversationBuffer += transcript;
        pendingTranscript = '';
        // Show full conversation in textarea
        inputEl.value = conversationBuffer;
        inputEl.scrollTop = inputEl.scrollHeight;
        // Submit accumulated context for analysis
        const contextText = conversationBuffer.length > CONTEXT_WINDOW
          ? conversationBuffer.slice(-CONTEXT_WINDOW)
          : conversationBuffer;
        queueAnalysis(contextText);
      } else {
        interimTranscript += transcript;
      }
    }
    // Show conversation + interim text
    inputEl.value = conversationBuffer + interimTranscript;
    inputEl.scrollTop = inputEl.scrollHeight;
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') return;
    if (event.error === 'aborted') return;
    stopListening();
  };

  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch {}
    }
  };
}

function startListening() {
  if (!recognition) return;
  isListening = true;
  isVoiceMode = true;
  pendingTranscript = '';
  interimTranscript = '';
  conversationBuffer = '';
  analyzedClaimKeys.clear();
  btnMic.classList.add('listening');
  inputBox.classList.add('listening');
  listeningBanner.classList.add('active');
  inputEl.placeholder = '正在监听语音...';
  inputEl.value = '';
  resultsEl.textContent = '';
  try { recognition.start(); } catch {}
}

function stopListening() {
  if (!recognition) return;
  isListening = false;
  isVoiceMode = false;
  btnMic.classList.remove('listening');
  inputBox.classList.remove('listening');
  listeningBanner.classList.remove('active');
  inputEl.placeholder = '输入对方说的话，或点击麦克风开启语音监听...';
  try { recognition.stop(); } catch {}
}

btnMic.addEventListener('click', () => {
  if (isListening) stopListening();
  else startListening();
});

// ── Analysis Queue (for voice mode) ──

function queueAnalysis(text) {
  if (!text) return;
  if (isAnalyzing) {
    // In voice mode, replace queued text with latest (always use most recent context)
    if (isVoiceMode) {
      analysisQueue = [text];
    } else {
      analysisQueue.push(text);
    }
    return;
  }
  doAnalyzeProgressive(text);
}

async function processQueue() {
  if (analysisQueue.length === 0) return;
  const next = analysisQueue.shift();
  await doAnalyzeProgressive(next);
}

// ── Progressive Analyze (extract → verdict per claim) ──

async function doAnalyze() {
  const text = inputEl.value.trim();
  if (!text || isAnalyzing) return;
  // Manual mode: reset dedup tracking
  isVoiceMode = false;
  analyzedClaimKeys.clear();
  await doAnalyzeProgressive(text);
}

async function doAnalyzeProgressive(text) {
  if (isAnalyzing) { analysisQueue.push(text); return; }
  isAnalyzing = true;

  btnVerify.classList.add('loading');
  btnVerify.disabled = true;
  scanLine.classList.add('active');
  pipelineProgress.classList.add('active');

  // In manual mode, clear results; in voice mode, append
  if (!isVoiceMode) {
    resultsEl.textContent = '';
  }

  try {
    // Step 1: Extract claims from context
    setPipelineStep('stepExtract');
    const extractResp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, step: 'extract' }),
    });

    if (!extractResp.ok) {
      const err = await extractResp.json().catch(() => ({ error: '请求失败' }));
      if (!isVoiceMode) {
        resultsEl.appendChild(el('div', { className: 'no-claims', textContent: err.error || '请求失败' }));
      }
      return;
    }

    const extraction = await extractResp.json();
    const allClaims = extraction.claims || [];

    // Filter out already-analyzed claims (dedup by normalized text)
    const newClaims = allClaims.filter(c => {
      const key = (c.normalized_claim || c.original_text || '').trim();
      return key && !analyzedClaimKeys.has(key);
    });

    if (newClaims.length === 0) {
      // No new claims to analyze
      if (!isVoiceMode) {
        if (extraction.main_argument) {
          resultsEl.appendChild(el('div', { className: 'main-argument', textContent: extraction.main_argument }));
        }
        resultsEl.appendChild(el('div', { className: 'no-claims', textContent: '未检测到可验证的事实性论点' }));
      }
      return;
    }

    // Mark new claims as analyzed
    newClaims.forEach(c => {
      const key = (c.normalized_claim || c.original_text || '').trim();
      analyzedClaimKeys.add(key);
    });

    // Show main argument (in voice mode, show as a divider for new analysis round)
    if (extraction.main_argument) {
      resultsEl.insertBefore(
        el('div', { className: 'main-argument', textContent: extraction.main_argument }),
        resultsEl.firstChild
      );
    }

    // Show skeleton cards for new claims (prepend, newest at top)
    const cardEls = [];
    newClaims.forEach((c, i) => {
      const card = renderSkeletonCard(c, i);
      // Insert after main-argument if exists, otherwise at top
      const insertRef = resultsEl.querySelector('.main-argument');
      if (insertRef && insertRef.nextSibling) {
        resultsEl.insertBefore(card, insertRef.nextSibling);
      } else if (insertRef) {
        resultsEl.appendChild(card);
      } else {
        resultsEl.insertBefore(card, resultsEl.firstChild);
      }
      cardEls.push({ el: card, claim: c, index: i });
    });

    // Remove empty state placeholder if present
    const emptyEl = resultsEl.querySelector('.results-empty');
    if (emptyEl) emptyEl.remove();
    const noClaimsEl = resultsEl.querySelector('.no-claims');
    if (noClaimsEl) noClaimsEl.remove();

    // Step 2: Search + Verdict for each new claim (concurrent)
    setPipelineStep('stepSearch');

    const verdictPromises = cardEls.map(async ({ el: cardEl, claim, index }) => {
      try {
        const vResp = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ step: 'verdict', claim }),
        });
        if (!vResp.ok) return;
        const verdict = await vResp.json();
        const realCard = renderVerdictCard(verdict, index);
        cardEl.replaceWith(realCard);
        return verdict;
      } catch {}
    });

    setPipelineStep('stepVerdict');
    const verdicts = await Promise.all(verdictPromises);

    // Save to Supabase
    const processedClaims = verdicts.filter(Boolean);
    if (processedClaims.length > 0) {
      saveToSupabase(text, extraction.main_argument || '', processedClaims);
      loadRecent();
    }

  } catch {
    if (!isVoiceMode) {
      resultsEl.appendChild(el('div', { className: 'no-claims', textContent: '网络错误，请检查连接后重试' }));
    }
  } finally {
    btnVerify.classList.remove('loading');
    btnVerify.disabled = false;
    scanLine.classList.remove('active');
    pipelineProgress.classList.remove('active');
    isAnalyzing = false;
    processQueue();
  }
}

// ── Render Skeleton Card (claim extracted, verdict pending) ──
function renderSkeletonCard(claim, index) {
  const card = el('div', {
    className: 'verdict-card skeleton',
    style: { animationDelay: (index * 0.12) + 's' }
  });

  const header = el('div', { className: 'verdict-header' }, [
    el('span', { className: 'verdict-badge pending', textContent: '验证中...' }),
  ]);
  card.appendChild(header);
  card.appendChild(el('div', { className: 'verdict-claim', textContent: claim.normalized_claim || claim.original_text || '' }));
  card.appendChild(el('div', { className: 'skeleton-bar' }));
  card.appendChild(el('div', { className: 'skeleton-bar short' }));

  return card;
}

// ── Render Full Verdict Card ──
function renderVerdictCard(c, index) {
  const v = c.verdict || 'unverifiable';
  const conf = Math.round((c.confidence || 0) * 100);

  const card = el('div', {
    className: 'verdict-card ' + v,
    style: { animationDelay: (index * 0.12) + 's' }
  });

  const header = el('div', { className: 'verdict-header' }, [
    el('span', { className: 'verdict-badge ' + v, textContent: (VERDICT_LABELS[v] || v) }),
    el('span', { className: 'verdict-conf', textContent: conf + '%' }),
  ]);
  card.appendChild(header);
  card.appendChild(el('div', { className: 'verdict-claim', textContent: c.normalized_claim || '' }));
  card.appendChild(el('div', { className: 'verdict-summary', textContent: c.summary || '' }));

  if (c.suggested_rebuttal) {
    const rebuttal = el('div', { className: 'verdict-rebuttal' }, [
      el('span', { className: 'verdict-rebuttal-label', textContent: 'Rebuttal' }),
      document.createTextNode(c.suggested_rebuttal),
    ]);
    card.appendChild(rebuttal);
  }

  if (c.evidence && c.evidence.length > 0) {
    const list = el('div', { className: 'evidence-list' });
    c.evidence.slice(0, 4).forEach(e => {
      const colorVar = e.supports_claim ? '--emerald' : '--rose';
      const icon = e.supports_claim ? '\u25CF' : '\u25CB';
      const item = el('div', { className: 'evidence-item' }, [
        el('span', { style: { color: 'var(' + colorVar + ')' }, textContent: icon }),
        el('a', { href: e.source_url, target: '_blank', rel: 'noopener', textContent: e.source_title }),
      ]);
      list.appendChild(item);
    });
    card.appendChild(list);
  }

  return card;
}

// ── Save to Supabase (from frontend) ──
async function saveToSupabase(inputText, mainArgument, claims) {
  try {
    await fetch(
      SUPABASE_URL + '/rest/v1/argue_analyses',
      {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ input_text: inputText, main_argument: mainArgument, claims }),
      }
    );
  } catch {}
}

// ── Load Recent from Supabase ──
async function loadRecent() {
  try {
    const resp = await fetch(
      SUPABASE_URL + '/rest/v1/argue_analyses?select=id,input_text,main_argument,claims,created_at&order=created_at.desc&limit=6',
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    if (!resp.ok) throw new Error('fetch failed');
    const rows = await resp.json();

    recentGrid.textContent = '';

    if (!rows.length) {
      recentGrid.appendChild(
        el('div', { className: 'results-empty', textContent: '暂无记录，成为第一个体验者', style: { gridColumn: '1 / -1' } })
      );
      return;
    }

    rows.forEach(r => {
      const claims = r.claims || [];
      const text = r.input_text.length > 60 ? r.input_text.slice(0, 60) + '\u2026' : r.input_text;

      const badges = el('div', { className: 'recent-badges' });
      claims.slice(0, 4).forEach(c => {
        const cssVar = VERDICT_CSS_COLORS[c.verdict] || '--slate';
        badges.appendChild(el('div', { className: 'recent-badge', style: { background: 'var(' + cssVar + ')' } }));
      });

      const card = el('div', { className: 'recent-card', onClick: () => {
        inputEl.value = r.input_text;
        doAnalyze();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }}, [
        el('div', { className: 'recent-text', textContent: text }),
        el('div', { className: 'recent-meta' }, [
          badges,
          el('span', { textContent: claims.length + ' claims \u00b7 ' + timeAgo(r.created_at) }),
        ]),
      ]);

      recentGrid.appendChild(card);
    });
  } catch {
    recentGrid.textContent = '';
    recentGrid.appendChild(
      el('div', { className: 'results-empty', textContent: '无法加载历史记录', style: { gridColumn: '1 / -1' } })
    );
  }
}

// ── Init ──
loadRecent();
</script>
